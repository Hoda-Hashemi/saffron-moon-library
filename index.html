<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A vivid Persian homepage for a future cultural archive.">
  <title>Saffron Moon Library</title>
  <style>
    :root {
      color-scheme: light;
      --ivory: #fff2d3;
      --lapis: #173f8a;
      --turquoise: #00a6a6;
      --pomegranate: #b11226;
      --saffron: #ffb000;
      --rose: #ff4f81;
      --ink: #190914;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100svh;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(255,79,129,.42), transparent 30%),
        radial-gradient(circle at 78% 28%, rgba(0,166,166,.46), transparent 30%),
        radial-gradient(circle at 66% 82%, rgba(255,176,0,.46), transparent 34%),
        var(--ivory);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .56;
      background:
        conic-gradient(from 45deg at 50% 50%, transparent 0 10%, rgba(23,63,138,.28) 10% 12%, transparent 12% 25%, rgba(177,18,38,.28) 25% 27%, transparent 27% 50%, rgba(0,166,166,.28) 50% 52%, transparent 52% 75%, rgba(255,176,0,.3) 75% 77%, transparent 77% 100%) 0 0 / 180px 180px;
      mix-blend-mode: multiply;
    }

    a, button { color: inherit; font: inherit; }
    a:focus-visible, button:focus-visible { outline: 3px solid var(--lapis); outline-offset: 4px; }

    .home {
      min-height: calc(100svh - 92px);
      position: relative;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 72px);
      isolation: isolate;
    }

    #ornament {
      position: absolute;
      inset: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
      mix-blend-mode: multiply;
    }

    .panel {
      width: min(1180px, 100%);
      min-height: min(760px, calc(100svh - 48px));
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, .65fr);
      align-items: end;
      gap: clamp(28px, 6vw, 90px);
      padding: clamp(24px, 5vw, 74px);
      border: 3px solid var(--lapis);
      background:
        linear-gradient(135deg, rgba(255,242,211,.92), rgba(255,242,211,.66)),
        radial-gradient(circle at 0 0, rgba(255,176,0,.45), transparent 42%);
      box-shadow: 18px 18px 0 var(--pomegranate), -18px -18px 0 var(--turquoise);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid var(--saffron);
      pointer-events: none;
    }

    .kicker {
      margin: 0 0 18px;
      color: var(--pomegranate);
      font: 700 13px/1.2 ui-sans-serif, system-ui, sans-serif;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--lapis);
      font-size: clamp(52px, 10vw, 138px);
      line-height: .95;
      letter-spacing: 0;
    }

    .farsi {
      display: block;
      direction: rtl;
      color: var(--pomegranate);
      font-family: "Noto Nastaliq Urdu", "Geeza Pro", "Times New Roman", serif;
      line-height: 1.55;
    }

    .latin {
      display: block;
      margin-top: .08em;
      font-style: italic;
    }

    .note {
      max-width: 560px;
      margin: 24px 0 0;
      color: var(--ink);
      font: 18px/1.6 ui-sans-serif, system-ui, sans-serif;
    }

    .seal {
      justify-self: end;
      width: min(330px, 100%);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--ivory);
      background:
        repeating-radial-gradient(circle, rgba(255,242,211,.9) 0 2px, transparent 3px 15px),
        conic-gradient(var(--lapis), var(--turquoise), var(--saffron), var(--rose), var(--pomegranate), var(--lapis));
      box-shadow: 0 0 0 12px var(--ivory), 0 0 0 15px var(--lapis);
      animation: turn 24s linear infinite;
    }

    .seal span {
      display: block;
      width: 68%;
      padding: 14px;
      background: var(--lapis);
      border: 2px solid var(--saffron);
      font: 800 18px/1.25 ui-sans-serif, system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .footer {
      z-index: 4;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding: 0 clamp(18px, 4vw, 56px) 28px;
      color: var(--lapis);
      font: 700 13px/1.4 ui-sans-serif, system-ui, sans-serif;
    }

    .footer a { text-decoration-thickness: 2px; text-underline-offset: .24em; }

    @keyframes turn {
      to { rotate: 360deg; }
    }

    @media (max-width: 760px) {
      body { overflow: auto; }
      .panel {
        min-height: auto;
        grid-template-columns: 1fr;
        box-shadow: 9px 9px 0 var(--pomegranate), -9px -9px 0 var(--turquoise);
      }
      .seal { justify-self: start; width: min(230px, 72vw); }
      .footer { padding: 0 18px 18px; flex-direction: column; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <main id="top" class="home">
    <canvas id="ornament" aria-hidden="true"></canvas>
    <section class="panel" aria-label="Persian archive homepage">
      <div>
        <p class="kicker">Homepage only / pages later</p>
        <h1>
          <span class="farsi" lang="fa" dir="rtl">کتابخانه ماه زعفران</span>
          <span class="latin">Saffron Moon Library</span>
        </h1>
        <p class="note">A vivid Persian homepage for a future archive of poetry, music, manuscripts, and visual memory. The inner pages are intentionally empty for now.</p>
      </div>
      <div class="seal" aria-hidden="true"><span>Persian palette mode</span></div>
    </section>
  </main>

  <footer class="footer">
    <span>Vivid homepage shell. No catalogue pages yet.</span>
    <a href="https://Hoda-Hashemi.github.io/saffron-moon-library/">GitHub Pages</a>
  </footer>

  <script>
    const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const canvas = document.querySelector("#ornament");
    const ctx = canvas.getContext("2d");
    function fit() {
      const dpr = Math.min(devicePixelRatio || 1, 1.5);
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, rect.width * dpr);
      canvas.height = Math.max(1, rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return rect;
    }
    function draw(t = 0) {
      const { width: w, height: h } = fit();
      ctx.clearRect(0, 0, w, h);
      const colors = ["#173f8a", "#00a6a6", "#ffb000", "#b11226", "#ff4f81"];
      for (let i = 0; i < 34; i++) {
        const x = (i * 97 + Math.sin(t * .0002 + i) * 34) % (w + 120) - 60;
        const y = (i * 61 + Math.cos(t * .00024 + i) * 28) % (h + 120) - 60;
        ctx.strokeStyle = colors[i % colors.length];
        ctx.lineWidth = 2;
        ctx.globalAlpha = .42;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.bezierCurveTo(x + 80, y - 120, x + 180, y + 120, x + 260, y);
        ctx.bezierCurveTo(x + 180, y - 90, x + 80, y + 90, x, y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      if (!reduced) requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
